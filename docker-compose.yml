services:

  backend:

    build:
      context: ./backend

    ports:
     - 5000:5000

  frontend:
    build:
      context: ./frontend

    ports:
      - 3000:3000

    restart: unless-stopped

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  database:

    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: user 
      MONGO_INITDB_ROOT_PASSWORD: password 

    ports:
      - 27017:27017

    restart: unless-stopped
    
    volumes: 
      - mongo_data:/data/db
  
volumes:
  mongo_data: